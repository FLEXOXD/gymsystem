<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f3cc9">
  <title>Sin conexion | GymSystem</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #111a34;
      --text: #e2e8f0;
      --muted: #9fb0cf;
      --accent: #0fb5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(15,181,255,.18), transparent 38%),
        radial-gradient(circle at 92% 88%, rgba(29,78,216,.22), transparent 42%),
        var(--bg);
    }
    .card {
      width: min(28rem, 100%);
      border: 1px solid rgba(148, 163, 184, .26);
      border-radius: 1rem;
      background: var(--card);
      box-shadow: 0 20px 45px rgba(2, 6, 23, .38);
      padding: 1.25rem;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
      letter-spacing: -.01em;
    }
    p {
      margin: .7rem 0 0;
      color: var(--muted);
      line-height: 1.55;
    }
    button {
      margin-top: 1rem;
      border: 0;
      border-radius: .75rem;
      background: linear-gradient(135deg, #0f3cc9, var(--accent));
      color: #fff;
      font-weight: 700;
      padding: .7rem 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <section class="card" role="status" aria-live="polite">
    <h1>Sin conexion por ahora</h1>
    <p>
      GymSystem no pudo cargar la vista porque no hay internet disponible en este momento.
      Reintenta cuando vuelva la conexion.
    </p>
    <button type="button" onclick="location.reload()">Reintentar</button>
  </section>
</body>
</html>
