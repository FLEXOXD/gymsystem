<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">Desayuno saludable</title>
  <desc id="desc">Plato con avena, fruta y proteina para energia de manana.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <radialGradient id="plate" cx="50%" cy="45%" r="48%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </radialGradient>
  </defs>
  <rect width="720" height="480" fill="url(#bg)"/>
  <circle cx="360" cy="250" r="156" fill="url(#plate)" opacity="0.95"/>
  <circle cx="360" cy="250" r="128" fill="#1e293b" opacity="0.15"/>
  <circle cx="315" cy="228" r="34" fill="#fbbf24"/>
  <circle cx="367" cy="215" r="30" fill="#f97316"/>
  <circle cx="405" cy="250" r="29" fill="#22c55e"/>
  <ellipse cx="350" cy="280" rx="72" ry="42" fill="#fef3c7"/>
  <text x="52" y="74" fill="#e2e8f0" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Desayuno</text>
  <text x="52" y="112" fill="#bae6fd" font-size="24" font-family="Segoe UI, Arial, sans-serif">energia y proteina</text>
</svg>
