name: Deploy GymSystem Production (PRO)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gymsystem-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- BUILD (GitHub) ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Composer install (production)
        run: |
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps + build
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Prepare artifact folder
        run: |
          rm -rf deploy_artifact
          mkdir -p deploy_artifact
          rsync -a --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude=".env" \
            ./ deploy_artifact/
          rm -rf deploy_artifact/storage || true

      - name: Create tar.gz
        run: |
          tar -czf deploy.tar.gz -C deploy_artifact .

      # ---------- UPLOAD (SCP) ----------
      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: 22
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "deploy.tar.gz"
          target: "/tmp"

      # ---------- DEPLOY (SSH) ----------
      - name: Deploy on server (atomic)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: 22
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -Eeuo pipefail

            BASE="/var/www/gymsystem"
            RELEASES="$BASE/releases"
            SHARED="$BASE/shared"
            TS="$(date +%Y%m%d%H%M%S)"
            NEW_RELEASE="$RELEASES/$TS"

            echo "== Paths =="
            echo "BASE=$BASE"
            echo "NEW_RELEASE=$NEW_RELEASE"

            sudo -n true

            sudo mkdir -p "$RELEASES" "$SHARED/storage"
            sudo test -f "$SHARED/.env" || { echo "ERROR: Falta $SHARED/.env"; exit 1; }

            sudo mkdir -p "$NEW_RELEASE"
            sudo tar -xzf /tmp/deploy.tar.gz -C "$NEW_RELEASE"
            rm -f /tmp/deploy.tar.gz

            cd "$NEW_RELEASE"

            sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            sudo rm -rf "$NEW_RELEASE/storage" || true
            sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"

            WEB_USER="www-data"
            if id -u apache >/dev/null 2>&1; then WEB_USER="apache"; fi

            sudo mkdir -p \
              "$SHARED/storage/app/public" \
              "$SHARED/storage/framework/cache/data" \
              "$SHARED/storage/framework/sessions" \
              "$SHARED/storage/framework/views" \
              "$SHARED/storage/logs"

            sudo chown -R "${{ secrets.SSH_USER }}":"$WEB_USER" \
              "$SHARED/storage" \
              "$NEW_RELEASE/public" \
              "$NEW_RELEASE/bootstrap/cache" || true

            sudo find "$SHARED/storage" "$NEW_RELEASE/public" "$NEW_RELEASE/bootstrap/cache" -type d -exec chmod 2775 {} \; || true
            sudo find "$SHARED/storage" "$NEW_RELEASE/public" "$NEW_RELEASE/bootstrap/cache" -type f -exec chmod 664 {} \; || true

            sudo -u "$WEB_USER" php artisan migrate --force
            sudo ln -sfn "$NEW_RELEASE/storage/app/public" "$NEW_RELEASE/public/storage"
            sudo -u "$WEB_USER" php artisan optimize:clear
            sudo -u "$WEB_USER" php artisan config:cache
            sudo -u "$WEB_USER" php artisan route:cache || sudo -u "$WEB_USER" php artisan route:clear
            sudo -u "$WEB_USER" php artisan view:cache  || sudo -u "$WEB_USER" php artisan view:clear

            sudo ln -sfn "$NEW_RELEASE" "$BASE/current"

            # Compatibility for servers still using legacy Apache DocumentRoot:
            # /var/www/gymsystem/public -> /var/www/gymsystem/current/public
            if [ -d "$BASE/public" ] && [ ! -L "$BASE/public" ]; then
              sudo rm -rf "$BASE/public"
            fi
            sudo ln -sfn "$BASE/current/public" "$BASE/public"
            echo "Legacy docroot link => $(readlink -f "$BASE/public")"

            # Enforce Apache vhosts to always use current/public (never fixed release or legacy /public).
            if [ -d /etc/apache2 ]; then
              for conf in /etc/apache2/sites-available/*.conf /etc/apache2/sites-enabled/*.conf /etc/apache2/conf-enabled/*.conf; do
                [ -f "$conf" ] || continue
                sudo sed -E -i \
                  -e "s#/var/www/gymsystem/releases/[0-9]{14}/public#/var/www/gymsystem/current/public#g" \
                  -e "s#/var/www/gymsystem/public#/var/www/gymsystem/current/public#g" \
                  "$conf"
              done
              if sudo grep -R -E -q "/var/www/gymsystem/releases/[0-9]{14}/public|/var/www/gymsystem/public" /etc/apache2/sites-enabled /etc/apache2/conf-enabled; then
                echo "ERROR: Apache still has hardcoded release/legacy paths"
                sudo grep -R -E "/var/www/gymsystem/releases/[0-9]{14}/public|/var/www/gymsystem/public" /etc/apache2/sites-enabled /etc/apache2/conf-enabled || true
                exit 1
              fi
              sudo apachectl -t
            fi

            # Best-effort post deploy tasks: do not fail the deployment here.
            set +e
            set +o pipefail

            sudo -u "$WEB_USER" php "$BASE/current/artisan" queue:restart

            if systemctl list-units --type=service --all | grep -q laravel-worker.service; then
              sudo systemctl restart laravel-worker
              echo "Restart attempt: laravel-worker"
            fi

            if systemctl list-units --type=service --all | grep -q apache2.service; then
              sudo systemctl restart apache2
              echo "Restart attempt: apache2"
            fi

            if systemctl list-units --type=service --all | grep -q nginx.service; then
              sudo systemctl restart nginx
              echo "Restart attempt: nginx"
            fi

            # IMPORTANT: with opcache.validate_timestamps=0, FPM must be restarted on every deploy.
            PHP_FPM_SERVICE="$(systemctl list-unit-files | awk '/^php[0-9]+\.[0-9]+-fpm\.service/{print $1; exit}')"
            if [ -n "$PHP_FPM_SERVICE" ]; then
              sudo systemctl restart "$PHP_FPM_SERVICE"
              echo "Restart attempt: $PHP_FPM_SERVICE"
            else
              echo "WARN: No encontre servicio php-fpm"
            fi

            if ! systemctl list-units --type=service --all | grep -q apache2.service && \
               ! systemctl list-units --type=service --all | grep -q nginx.service; then
              echo "WARN: No encontre apache2 ni nginx"
            fi

            # Delete corrupted releases (missing critical files) to avoid confusion.
            sudo bash -lc "for d in '$RELEASES'/*; do \
              [ -d \"\$d\" ] || continue; \
              [ \"\$d\" = '$NEW_RELEASE' ] && continue; \
              if [ ! -f \"\$d/artisan\" ] || [ ! -f \"\$d/public/index.php\" ] || [ ! -f \"\$d/vendor/autoload.php\" ]; then \
                echo \"Removing corrupted release: \$d\"; \
                rm -rf \"\$d\"; \
              fi; \
            done"

            # Keep only latest 5 releases.
            sudo bash -lc "cd '$RELEASES' && ls -1dt */ | tail -n +6 | xargs -r rm -rf"

            echo "Deploy PRO terminado"
            exit 0

      - name: Post-deploy health check (resilient)
        run: |
          set -euo pipefail

          PRIMARY_URL="${{ secrets.HEALTHCHECK_URL }}"
          FALLBACK_URL_1="https://gymsystemflexjokagencia.duckdns.org/cliente/premium/login"
          FALLBACK_URL_2="https://gymsystemflexjokagencia.duckdns.org/login"

          URLS=()
          if [ -n "${PRIMARY_URL}" ]; then
            URLS+=("${PRIMARY_URL}")
          fi
          URLS+=("${FALLBACK_URL_1}")
          URLS+=("${FALLBACK_URL_2}")

          dns_ready() {
            local host="$1"
            if command -v getent >/dev/null 2>&1; then
              getent ahostsv4 "${host}" >/dev/null 2>&1 || getent hosts "${host}" >/dev/null 2>&1
              return $?
            fi
            if command -v nslookup >/dev/null 2>&1; then
              nslookup "${host}" >/dev/null 2>&1
              return $?
            fi
            return 0
          }

          url_host() {
            local url="$1"
            echo "${url}" | sed -E 's#^[a-zA-Z]+://([^/:]+).*#\1#'
          }

          OK=0
          for URL in "${URLS[@]}"; do
            HOST="$(url_host "${URL}")"
            echo "Healthcheck URL candidate: ${URL}"

            for i in $(seq 1 24); do
              if ! dns_ready "${HOST}"; then
                echo "Attempt ${i} -> DNS not ready for ${HOST}"
                sleep 5
                continue
              fi

              TMP_ERR="$(mktemp)"
              set +e
              CODE="$(curl -k -sS -o /dev/null -w '%{http_code}' -I --connect-timeout 8 --max-time 20 "${URL}" 2>"${TMP_ERR}")"
              CURL_RC=$?
              set -e
              ERR_MSG="$(tr '\n' ' ' < "${TMP_ERR}" | sed -E 's/[[:space:]]+/ /g' | sed -E 's/[[:space:]]+$//')"
              rm -f "${TMP_ERR}"

              if [ "${CURL_RC}" -eq 0 ] && { [ "${CODE}" = "200" ] || [ "${CODE}" = "301" ] || [ "${CODE}" = "302" ]; }; then
                echo "Attempt ${i} -> HTTP ${CODE} (OK) on ${URL}"
                OK=1
                break 2
              fi

              if [ -n "${ERR_MSG}" ]; then
                echo "Attempt ${i} -> curl rc=${CURL_RC}, http=${CODE}, err=${ERR_MSG}"
              else
                echo "Attempt ${i} -> curl rc=${CURL_RC}, http=${CODE}"
              fi
              sleep 5
            done
          done

          if [ "${OK}" -ne 1 ]; then
            echo "ERROR: Health check failed after retries on all candidate URLs."
            exit 1
          fi

