name: Deploy GymSystem Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gymsystem-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Google Cloud VM
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail

            PROJECT_DIR="/var/www/gymsystem"
            DEPLOY_USER="$(whoami)"

            # Ensure deploy user can always update git-tracked files
            sudo chown -R "$DEPLOY_USER:$DEPLOY_USER" "$PROJECT_DIR"
            sudo chmod -R u+rwX "$PROJECT_DIR"
            cd "$PROJECT_DIR"
            git config --global --add safe.directory "$PROJECT_DIR"

            # Safety checks
            test -f artisan
            test -f composer.json
            test -f package.json

            # Keep code in sync with main
            git fetch --all --prune
            git checkout -f main
            git reset --hard origin/main
            git clean -fd

            # Ensure production mode is active
            grep -q '^APP_ENV=production$' .env || { echo "ERROR: APP_ENV must be production"; exit 1; }
            grep -q '^APP_DEBUG=false$' .env || { echo "ERROR: APP_DEBUG must be false"; exit 1; }

            # Install dependencies and build assets
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            npm ci --no-audit --no-fund
            npm run build

            # Runtime permissions for Laravel write paths
            sudo chown -R "$DEPLOY_USER":www-data "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache"
            sudo find "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache" -type d -exec chmod 2775 {} \;
            sudo find "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache" -type f -exec chmod 664 {} \;

            # Database + Laravel caches (run as web user)
            sudo -u www-data php artisan migrate --force
            sudo -u www-data php artisan storage:link || true
            sudo -u www-data php artisan config:clear
            sudo -u www-data php artisan cache:clear
            sudo -u www-data php artisan view:clear
            sudo -u www-data php artisan route:clear
            sudo -u www-data php artisan config:cache
            if ! sudo -u www-data php artisan route:cache; then
              echo "WARN: route:cache failed; keeping routes uncached"
              sudo -u www-data php artisan route:clear
            fi
            if ! sudo -u www-data php artisan view:cache; then
              echo "WARN: view:cache failed; keeping views uncached"
              sudo -u www-data php artisan view:clear
            fi

            # Restart web server
            sudo systemctl restart apache2
