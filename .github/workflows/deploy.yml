name: Deploy GymSystem Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gymsystem-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Google Cloud VM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -Eeuo pipefail

            PROJECT_DIR="/var/www/gymsystem"
            DEPLOY_USER="$(whoami)"

            echo "== Whoami =="
            echo "$DEPLOY_USER"

            echo "== Check project dir =="
            test -d "$PROJECT_DIR" || { echo "ERROR: No existe $PROJECT_DIR"; exit 1; }
            cd "$PROJECT_DIR"

            echo "== Check sudo (sin password) =="
            sudo -n true || { echo "ERROR: Este usuario NO tiene sudo sin password. Arregla sudoers o usa root."; exit 1; }

            echo "== Tool versions =="
            php -v || true
            composer -V || { echo "ERROR: composer no instalado"; exit 1; }
            node -v || { echo "ERROR: node no instalado"; exit 1; }
            npm -v || { echo "ERROR: npm no instalado"; exit 1; }

            echo "== Safety checks =="
            test -f artisan || { echo "ERROR: No existe artisan en $PROJECT_DIR"; exit 1; }
            test -f composer.json || { echo "ERROR: No existe composer.json"; exit 1; }
            test -f package.json || { echo "ERROR: No existe package.json"; exit 1; }

            echo "== Git safe directory =="
            git config --global --add safe.directory "$PROJECT_DIR" || true

            echo "== Update code =="
            git fetch --all --prune
            git checkout -f main
            git reset --hard origin/main
            git clean -fd

            echo "== .env checks (flexible) =="
            test -f .env || { echo "ERROR: No existe .env"; exit 1; }
            grep -Eq '^APP_ENV=production\b' .env || { echo "ERROR: APP_ENV debe ser production"; exit 1; }
            grep -Eq '^APP_DEBUG=false\b' .env || { echo "ERROR: APP_DEBUG debe ser false"; exit 1; }

            echo "== Composer install =="
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "== Build assets =="
            npm ci --no-audit --no-fund
            npm run build

            echo "== Laravel writable dirs permissions =="
            sudo chown -R "$DEPLOY_USER":www-data "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache"
            sudo find "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache" -type d -exec chmod 2775 {} \;
            sudo find "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache" -type f -exec chmod 664 {} \;

            echo "== Migrate + caches =="
            sudo -u www-data php artisan migrate --force
            sudo -u www-data php artisan storage:link || true
            sudo -u www-data php artisan optimize:clear
            sudo -u www-data php artisan config:cache
            sudo -u www-data php artisan route:cache || sudo -u www-data php artisan route:clear
            sudo -u www-data php artisan view:cache || sudo -u www-data php artisan view:clear

            echo "== Restart web services (auto-detect) =="
            if systemctl list-units --type=service --all | grep -q apache2.service; then
              sudo systemctl restart apache2
              echo "Restarted apache2"
            elif systemctl list-units --type=service --all | grep -q nginx.service; then
              sudo systemctl restart nginx
              echo "Restarted nginx"
              # intenta reiniciar php-fpm si existe
              if systemctl list-units --type=service --all | grep -q php8.2-fpm.service; then
                sudo systemctl restart php8.2-fpm
                echo "Restarted php8.2-fpm"
              fi
            else
              echo "WARN: No encontré apache2 ni nginx para reiniciar"
            fi

            echo "✅ Deploy terminado"