name: Deploy GymSystem Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gymsystem-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Google Cloud VM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: ${{ secrets.SSH_USER }}

          # ✅ IMPORTANTE: multiline key (evita "none publickey")
          key: |
            ${{ secrets.SSH_KEY }}

          # (Opcional) Si quieres asegurar que conectas al server correcto:
          # fingerprint: ${{ secrets.SSH_FINGERPRINT }}

          script_stop: true
          command_timeout: 40m
          script: |
            set -Eeuo pipefail

            PROJECT_DIR="/var/www/gymsystem"
            DEPLOY_USER="$(whoami)"

            echo "=============================="
            echo " Deploy GymSystem Production"
            echo " User: $DEPLOY_USER"
            echo " Host: $(hostname)"
            echo " Dir : $PROJECT_DIR"
            echo " Time: $(date -Is)"
            echo "=============================="

            echo "== Check project dir =="
            test -d "$PROJECT_DIR" || { echo "ERROR: No existe $PROJECT_DIR"; exit 1; }
            cd "$PROJECT_DIR"

            echo "== Check sudo (sin password) =="
            sudo -n true || { echo "ERROR: sudo pide password. Revisa /etc/sudoers.d/gymsystem-deploy"; exit 1; }

            echo "== Tool versions =="
            php -v || true
            command -v composer >/dev/null || { echo "ERROR: composer no instalado"; exit 1; }
            composer -V
            command -v node >/dev/null || { echo "ERROR: node no instalado"; exit 1; }
            node -v
            command -v npm >/dev/null || { echo "ERROR: npm no instalado"; exit 1; }
            npm -v

            echo "== Safety checks =="
            test -f artisan || { echo "ERROR: No existe artisan en $PROJECT_DIR"; exit 1; }
            test -f composer.json || { echo "ERROR: No existe composer.json"; exit 1; }
            test -f package.json || { echo "ERROR: No existe package.json"; exit 1; }
            test -f .env || { echo "ERROR: No existe .env en $PROJECT_DIR"; exit 1; }

            echo "== Git safe directory =="
            git config --global --add safe.directory "$PROJECT_DIR" || true

            echo "== Update code (main) =="
            git fetch --all --prune
            git checkout -f main
            git reset --hard origin/main
            git clean -fd

            echo "== .env checks (flexible) =="
            grep -Eq '^APP_ENV=production\b' .env || { echo "ERROR: APP_ENV debe ser production"; exit 1; }
            grep -Eq '^APP_DEBUG=false\b' .env || { echo "ERROR: APP_DEBUG debe ser false"; exit 1; }

            echo "== Install PHP deps =="
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            echo "== Build assets =="
            npm ci --no-audit --no-fund
            npm run build

            echo "== Determine web user =="
            WEB_USER="www-data"
            if id -u www-data >/dev/null 2>&1; then
              WEB_USER="www-data"
            elif id -u apache >/dev/null 2>&1; then
              WEB_USER="apache"
            fi
            echo "Web user: $WEB_USER"

            echo "== Laravel writable dirs permissions =="
            sudo chown -R "$DEPLOY_USER":"$WEB_USER" "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache"
            sudo find "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache" -type d -exec chmod 2775 {} \;
            sudo find "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache" -type f -exec chmod 664 {} \;

            echo "== Migrate + caches =="
            sudo -u "$WEB_USER" php artisan migrate --force
            sudo -u "$WEB_USER" php artisan storage:link || true
            sudo -u "$WEB_USER" php artisan optimize:clear
            sudo -u "$WEB_USER" php artisan config:cache
            sudo -u "$WEB_USER" php artisan route:cache || sudo -u "$WEB_USER" php artisan route:clear
            sudo -u "$WEB_USER" php artisan view:cache  || sudo -u "$WEB_USER" php artisan view:clear

            echo "== Restart web services (auto-detect) =="
            if systemctl list-units --type=service --all | grep -q apache2.service; then
              sudo systemctl restart apache2
              echo "Restarted apache2"
            elif systemctl list-units --type=service --all | grep -q nginx.service; then
              sudo systemctl restart nginx
              echo "Restarted nginx"
              if systemctl list-units --type=service --all | grep -q php8.2-fpm.service; then
                sudo systemctl restart php8.2-fpm
                echo "Restarted php8.2-fpm"
              fi
            else
              echo "WARN: No encontré apache2 ni nginx para reiniciar"
            fi

            echo "✅ Deploy terminado"